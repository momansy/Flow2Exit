<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow2Exit Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="requireLogin(); initDashboard();">
  <nav class="topbar">
    <div class="brand-row"><div class="logo">F2</div><h2>Flow2Exit</h2></div>
    <input class="search" id="patientSearch" placeholder="Search patient by name, MRN, or bed" oninput="searchPatientCards()" />
    <button class="primary" onclick="createNewSummary()">New Summary</button>
    <button onclick="logout()">Logout</button><div class="doctor-pill">👨‍⚕️ <span class="doctor-name">Dr. Maya Singh</span></div>
  </nav>

  <main class="page">
    <h1>Cardiology Discharge Dashboard</h1>
    <section class="grid three">
      <div class="card">
        <h2>Patients</h2>
        <p class="muted">Saved patients appear here after saving a draft.</p>
        <div id="patientList" class="patient-list"></div>
      </div>
      <div class="card">
        <h2>Drafts</h2>
        <p class="muted">Local drafts appear here after saving.</p>
        <div id="draftList"></div>
        <button onclick="renderDashboardDrafts()">Refresh Drafts</button>
      </div>
      <div class="card">
        <h2>Workflow</h2>
        <p>1 Fill clinical form</p>
        <p>2 Validate required fields</p>
        <p>3 Generate doctor + patient reports</p>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
