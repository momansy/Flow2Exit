<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow2Exit Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <div class="brand-row center"><div class="logo">F2</div><h1>Flow2Exit</h1></div>
    <p class="muted center-text">Cardiology Discharge Summary System</p>
    <label>Email</label>
    <input id="loginEmail" value="doctor@flow2exit.com" />
    <label>Password</label>
    <input id="loginPassword" type="password" value="123456" />
    <button class="primary full" onclick="login()">Login</button>
    <p class="hint">Demo login: doctor@flow2exit.com / 123456</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
